<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Section</title>
    <script src="https://api.bitrix24.com/api/v1/"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; font-size: 13px; color: #333; background: transparent; }
        .bx-section { background: #fff; border-radius: 8px; padding-bottom: 12px; }
        .section-header { padding: 12px 16px 8px; border-bottom: 1px solid #f2f4f7; }
        .section-title { font-size: 13px; font-weight: 700; color: #2fc6f6; text-transform: uppercase; }
        .field-row { display: flex; gap: 12px; padding: 8px 16px; align-items: flex-end; }
        .field-group { display: flex; flex-direction: column; flex: 1; gap: 6px; }
        .field-group.half { flex: 0 0 calc(50% - 6px); }
        .field-label { font-size: 11px; font-weight: 700; color: #a1a6b1; text-transform: uppercase; }
        .bx-input, .bx-select { width: 100%; height: 38px; padding: 0 12px; border: 1px solid #cbd0da; border-radius: 4px; color: #424956; outline: none; }
        .bx-input:focus, .bx-select:focus { border-color: #2fc6f6; }
        .balloon-section { padding: 12px 16px 4px; }
        .balloon-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .balloon-title { font-size: 12px; font-weight: 700; color: #535c69; }
        .btn-add-balloon { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #2fc6f6; background: transparent; color: #2fc6f6; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-add-balloon:hover { background: #2fc6f6; color: #fff; }
        .balloon-row { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
        .balloon-row .bx-input { flex: 1; background: #f8fafc; border: 1px solid #ddecfa; }
        .btn-remove-balloon { background: transparent; border: none; color: #ff5c5c; font-size: 22px; cursor: pointer; }
        .custom-fields-block { border-top: 1px solid #f2f4f7; margin-top: 8px; padding-top: 4px; display: none; }
        .custom-fields-block.visible { display: block; }
    </style>
</head>
<body>
<div class="bx-section">
    <div class="section-header"><span class="section-title">Payment Details</span></div>
    <div class="field-row">
        <div class="field-group">
            <span class="field-label">Payment Plan</span>
            <select class="bx-select" id="paymentPlan" onchange="onPlanChange()">
                <option value="">— Select —</option>
                <option value="60_40">60/40</option>
                <option value="3_years">3 Years</option>
                <option value="5_years">5 Years</option>
                <option value="full_payment">Full Payment</option>
                <option value="custom">Custom</option>
            </select>
        </div>
        <div class="field-group half">
            <span class="field-label">Discount %</span>
            <input type="number" class="bx-input" id="discountPct" placeholder="0">
        </div>
    </div>
    <div class="balloon-section">
        <div class="balloon-header">
            <span class="balloon-title">Balloon Payments</span>
            <button class="btn-add-balloon" onclick="addBalloonRow()" type="button">+</button>
        </div>
        <div id="balloonRows"></div>
    </div>
    <div class="custom-fields-block" id="customBlock">
        <div class="field-row">
            <div class="field-group"><span class="field-label">Total Amount</span><input type="number" class="bx-input" id="totalAmount"></div>
        </div>
        <div class="field-row">
            <div class="field-group half"><span class="field-label">Downpayment %</span><input type="number" class="bx-input" id="downpaymentPct"></div>
            <div class="field-group half"><span class="field-label">Downpayment Date</span><input type="date" class="bx-input" id="downpaymentDate"></div>
        </div>
        <div class="field-row">
            <div class="field-group half"><span class="field-label">On Possession %</span><input type="number" class="bx-input" id="possessionPct"></div>
            <div class="field-group half"><span class="field-label">On Possession Date</span><input type="date" class="bx-input" id="possessionDate"></div>
        </div>
        <div class="field-row">
            <div class="field-group half">
                <span class="field-label">Payment Plan</span>
                <select class="bx-select" id="innerPaymentPlan">
                    <option value="">— Select —</option>
                    <option value="monthly">Monthly</option>
                    <option value="quarterly">Quarterly</option>
                    <option value="biannually">Biannually</option>
                    <option value="annually">Annually</option>
                </select>
            </div>
            <div class="field-group half"><span class="field-label">Payment Plan Units</span><input type="number" class="bx-input" id="paymentPlanUnits"></div>
        </div>
    </div>
</div>
<script>
let balloonCounter = 0;

function addBalloonRow() {
    balloonCounter++;
    const idx = balloonCounter;
    const row = document.createElement('div');
    row.className = 'balloon-row';
    row.id = `balloonRow_${idx}`;
    row.innerHTML = `
        <input type="text" class="bx-input" placeholder="Position" data-balloon="position">
        <input type="number" class="bx-input" placeholder="Amount (PKR)" data-balloon="amount">
        <button class="btn-remove-balloon" onclick="removeBalloonRow(${idx})" type="button">&times;</button>
    `;
    document.getElementById('balloonRows').appendChild(row);
    BX24.fitWindow();
    handleDataChange();
}

function removeBalloonRow(idx) {
    const row = document.getElementById(`balloonRow_${idx}`);
    if (row) row.remove();
    BX24.fitWindow();
    handleDataChange();
}

function onPlanChange() {
    const plan = document.getElementById('paymentPlan').value;
    document.getElementById('customBlock').classList.toggle('visible', plan === 'custom');
    BX24.fitWindow();
    handleDataChange();
}

function collectData() {
    const balloons = [];
    document.querySelectorAll('#balloonRows .balloon-row').forEach(function(row) {
        const pos = row.querySelector('[data-balloon="position"]').value;
        const amt = row.querySelector('[data-balloon="amount"]').value;
        if (pos || amt) balloons.push({ position: pos, amount: amt });
    });
    return {
        paymentPlan: document.getElementById('paymentPlan').value,
        discountPct: document.getElementById('discountPct').value,
        balloonPayments: balloons,
        totalAmount: document.getElementById('totalAmount').value,
        downpaymentPct: document.getElementById('downpaymentPct').value,
        downpaymentDate: document.getElementById('downpaymentDate').value,
        possessionPct: document.getElementById('possessionPct').value,
        possessionDate: document.getElementById('possessionDate').value,
        innerPaymentPlan: document.getElementById('innerPaymentPlan').value,
        paymentPlanUnits: document.getElementById('paymentPlanUnits').value
    };
}

function handleDataChange() {
    if (window.BX24) {
        const jsonString = JSON.stringify(collectData());
        BX24.placement.call('setValue', jsonString);
    }
}

function populate(rawValue) {
    if (!rawValue) return;
    try {
        const data = typeof rawValue === 'string' ? JSON.parse(rawValue) : rawValue;
        document.getElementById('paymentPlan').value = data.paymentPlan || '';
        document.getElementById('discountPct').value = data.discountPct || '';
        document.getElementById('customBlock').classList.toggle('visible', data.paymentPlan === 'custom');
        
        if (Array.isArray(data.balloonPayments)) {
            document.getElementById('balloonRows').innerHTML = '';
            data.balloonPayments.forEach(function(b, i) {
                balloonCounter = i;
                const row = document.createElement('div');
                row.className = 'balloon-row';
                row.id = `balloonRow_${i}`;
                row.innerHTML = `
                    <input type="text" class="bx-input" data-balloon="position" value="${b.position || ''}">
                    <input type="number" class="bx-input" data-balloon="amount" value="${b.amount || ''}">
                    <button class="btn-remove-balloon" onclick="removeBalloonRow(${i})" type="button">&times;</button>
                `;
                document.getElementById('balloonRows').appendChild(row);
            });
        }
        ['totalAmount','downpaymentPct','downpaymentDate','possessionPct','possessionDate','paymentPlanUnits'].forEach(id => {
            document.getElementById(id).value = data[id] || '';
        });
        if (data.innerPaymentPlan) document.getElementById('innerPaymentPlan').value = data.innerPaymentPlan;
    } catch(e) {}
}

BX24.init(function() {
    const info = BX24.placement.info();
    if (info && info.options && info.options.value) {
        populate(info.options.value);
    }
    BX24.placement.bindEvent('save', function(event) {
        BX24.placement.call('setValue', JSON.stringify(collectData()), function() {
            event.fulfill();
        });
    });
    BX24.fitWindow();
});

document.addEventListener('input', handleDataChange);
document.addEventListener('change', handleDataChange);
</script>
</body>
</html>
