<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setup</title>
    <script src="https://api.bitrix24.com/api/v1/"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 40px;">
    <h2>Southlofts Payment Engine</h2>
    <button onclick="install()" style="background:#2fc6f6; color:#fff; padding:12px 24px; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Register User Field</button>
<script>
function install() {
    BX24.callMethod('userfieldtype.add', {
        USER_TYPE_ID: 'southlofts_payment_field',
        HANDLER: window.location.origin + '/handler.html',
        TITLE: 'Payment Details',
        OPTIONS: { height: 450 }
    }, function() {
        BX24.callMethod('crm.deal.userfield.add', {
            fields: {
                FIELD_NAME: 'UF_CRM_PAYMENT_SECTION',
                USER_TYPE_ID: 'southlofts_payment_field',
                EDIT_FORM_LABEL: { "en": "Payment Details" },
                LIST_COLUMN_LABEL: { "en": "Payment Details" }
            }
        }, function(res) {
            if(res.error()) alert(res.error().toString());
            else alert('✓ Registered successfully! Field ID: ' + res.data());
        });
    });
}
</script>
</body>
</html>
